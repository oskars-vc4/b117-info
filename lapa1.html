<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ārstu darba grafiks - 1 Sekcija</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --header-bg: #10693a; 
            --header-text: #ffffff;
            --row-even: #f1f8e9;
            --border-color: #bcbcbc;
            --accent-color: #d32f2f; 
        }

        /* Pilnībā noņemam scrollbars */
        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            scrollbar-width: none; -ms-overflow-style: none;
        }
        *::-webkit-scrollbar { display: none; }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background-color: #ffffff;
            width: 1440px; height: 1080px;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        .wrapper {
            padding: 20px; /* Tava 20px atstarpe */
            height: 100%; width: 100%;
            display: flex; flex-direction: column;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background-color: var(--header-bg);
            color: var(--header-text) !important;
            text-align: left;
            padding: 15px 20px;
            font-size: 32px !important; /* Lieli virsraksti */
            font-weight: 700;
            text-transform: uppercase;
            border: 2px solid var(--border-color);
        }

        td {
            padding: 15px 20px;
            border: 2px solid var(--border-color);
            font-size: 36px; /* Ļoti lieli burti vienai kolonnai */
            line-height: 1.1;
            vertical-align: middle;
            word-wrap: break-word;
        }

        tr:nth-child(even) { background-color: var(--row-even); }

        /* Proporcijas vienai platai tabulai */
        .col-1 { width: 35%; font-weight: 700; color: #10693a; }
        .col-2 { width: 35%; }
        .col-3 { width: 10%; text-align: center; color: var(--accent-color); font-weight: 700; font-size: 42px; }
        .col-4 { width: 20%; font-size: 24px; color: #444; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div id="content"></div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0Jscw2AdeYt5syqR7_z_O5iBBdeopMpIDWXOUKbLo_KlnLWNUD6w_ljstR2GW9jHYlu5Kytp7QeDx/pub?output=csv';
        
        // ŠEIT MAINĪT: 0 ir pirmā lapa, 1 ir otrā, 2 ir trešā
        const LAPAS_NUMURS = 1; 

        function init() {
            Papa.parse(csvUrl, {
                download: true,
                header: false,
                complete: function(results) {
                    let data = results.data.filter(row => row.length > 1 && row[0] !== "");
                    while (data.length > 0 && (data[0][0].toLowerCase().includes("spec") || data[0][0] === "")) {
                        data.shift();
                    }
                    
                    // Sadalām datus 3 daļās
                    const perPage = Math.ceil(data.length / 3);
                    const start = LAPAS_NUMURS * perPage;
                    const end = start + perPage;
                    const pageData = data.slice(start, end);
                    
                    renderTable(pageData);
                }
            });
        }

        function renderTable(data) {
            const container = document.getElementById('content');
            let html = `<table>
                <thead>
                    <tr>
                        <th class="col-1">Specialitāte</th>
                        <th class="col-2">Ārsts</th>
                        <th class="col-3">Kab.</th>
                        <th class="col-4">Informācija</th>
                    </tr>
                </thead>
                <tbody>`;
            
            data.forEach(row => {
                html += `<tr>
                    <td class="col-1">${row[0] || ''}</td>
                    <td class="col-2">${row[1] || ''}</td>
                    <td class="col-3">${row[2] || ''}</td>
                    <td class="col-4">${row[3] || ''}</td>
                </tr>`;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        init();
        setInterval(init, 300000);
    </script>
</body>
</html>
