<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
    <title>Ārstu grafiks - Digital Signage 1440x1080</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --header-bg: #10693a; 
            --header-text: #ffffff;
            --row-even: #f1f8e9;
            --border-color: #bcbcbc;
            --accent-color: #d32f2f; 
            --phone-color: #10693a;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden !important;
            background-color: #ffffff;
            font-family: 'Roboto Condensed', sans-serif;
            margin: 0;
            padding: 0;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* Scrollbar slēpšana */
        *::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        .wrapper {
            width: 100vw;
            height: 100vh;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .container {
            width: 100%;
            flex-grow: 1;
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background-color: var(--header-bg);
            color: var(--header-text) !important;
            text-align: left;
            padding: 5px 10px;
            font-size: 22px !important;
            font-weight: 700;
            text-transform: uppercase;
            border: 1px solid var(--border-color);
            height: 45px;
        }

        td {
            padding: 2px 8px;
            border: 1px solid var(--border-color);
            font-size: 20px; 
            line-height: 1.1;
            vertical-align: middle;
            word-wrap: break-word;
            /* Rindu augstums samazinâts uz 44px, lai ietilptu vairâk ierakstu */
            height: 50px; 
            overflow: hidden;
        }

        tr:nth-child(even) { background-color: var(--row-even); }

        /* Koriççti kolonnu platumi pçc tavas prasîbas */
        .col-1 { width: 28%; font-weight: 700; color: #333; font-size: 20px; } /* Specialitâte - BOLD */
        .col-2 { width: 20%; color: #333; font-size: 20px; } /* Ärsts - vienâds fonts */
        .col-3 { width: 15%; text-align: center; color: var(--accent-color); font-weight: 700; font-size: 20px; } /* KAB - atðkirîgs fonts */
        .col-4 { width: 22%; color: #333; font-size: 20px; } /* Informâcija - palielinâts */
        .col-5 { width: 15%; text-align: center; color: #333; font-size: 20px; } /* Tâlrunis - palielinâts, centrçts */
        
        /* Centrçt tikai Tâlrunis header */
        th.col-5 { text-align: center !important; }
        
        /* Plûdenâ pârslçðanâs starp lapâm */
        .fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
            z-index: 10;
        }
        
        .fade-overlay.active {
            opacity: 1;
        }
        
        .container {
            position: relative;
        }

        #error-msg {
            color: white;
            background: red;
            text-align: center;
            padding: 5px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="error-msg">Kļūda: Nevar ielādēt datus.</div>

    <div class="wrapper">
        <div id="content" class="container">
            <div class="fade-overlay"></div>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTeIGRXdkbiBp7_PtmYVC5zsRjmlSfR2sTDeXLTawFfj_mTgh_MJWSveISDXJbhZPusuxQK0OWG14Ri/pub?output=csv';
        
        let allData = [];
        let currentPage = 0;
        let paginationInterval;
        let itemsPerPage = 52; // Dinamiski tiks aprēķināts

        function loadData() {
            Papa.parse(csvUrl, {
                download: true,
                header: false,
                complete: function(results) {
                    let data = results.data.filter(row => row.length > 1 && row[0].trim() !== "");
                    if (data.length > 0 && (data[0][0].toLowerCase().includes("spec") || data[0][0] === "")) {
                        data.shift();
                    }
                    allData = data;
                    
                    // Dinamiski aprēķinām, cik rindu var rādīt vienā lapā
                    // Sadalām datus vienādi starp abiem ekrāniem
                    const maxRowsPerScreen = Math.floor(data.length / 2);
                    // Mēģinām rādīt pēc iespējas vairāk, bet ne vairāk kā 30 rindu vienā ekrānā
                    itemsPerPage = Math.min(maxRowsPerScreen * 2, 60);
                    
                    // Ja ir mazāk par 10 rindām kopā, rādām visas uzreiz
                    if (data.length <= 10) {
                        itemsPerPage = data.length;
                    }
                    
                    console.log(`Kopējais rindu skaits: ${data.length}, Rindas vienā lapā: ${itemsPerPage}`);
                    
                    currentPage = 0;
                    startPagination();
                    renderPage();
                },
                error: function() {
                    document.getElementById('error-msg').style.display = 'block';
                }
            });
        }

        function startPagination() {
            // Apturiet iepriekšējo intervālu, ja tāds ir
            if (paginationInterval) {
                clearInterval(paginationInterval);
            }
            
            // Sākt jaunu pagināciju katras 20 sekundes
            paginationInterval = setInterval(() => {
                currentPage = (currentPage + 1) % Math.ceil(allData.length / itemsPerPage);
                renderPage();
            }, 20000);
        }

        function renderPage() {
            const container = document.getElementById('content');
            const fadeOverlay = container.querySelector('.fade-overlay');
            
            // Fade out efekts
            fadeOverlay.classList.add('active');
            
            setTimeout(() => {
                // Noñemam vecos tabulas, bet atstâjam fade overlay
                const sections = container.querySelectorAll('.section');
                sections.forEach(section => section.remove());

                const startIndex = currentPage * itemsPerPage;
                const endIndex = Math.min(startIndex + itemsPerPage, allData.length);
                const pageData = allData.slice(startIndex, endIndex);

                // Pârbaudâm, cik sekcijas ir informâcijâ un pielâgojam rindu skaitu
                let rowsPerSection = 10; // Noklusçjuma
                pageData.forEach(row => {
                    if (row[3] && row[3].includes('/')) {
                        const sections = row[3].split('/').length;
                        if (sections > 1) {
                            rowsPerSection = 20; // Ja ir 2+ sekcijas, tad 20 rindas katrâ pusç
                        }
                    }
                });
                
                const leftSection = pageData.slice(0, rowsPerSection);
                const rightSection = pageData.slice(rowsPerSection, rowsPerSection * 2);
                const sectionsData = [leftSection, rightSection];

                sectionsData.forEach((slice, index) => {
                    const sectionDiv = document.createElement('div');
                    sectionDiv.className = 'section';
                    
                    let rows = slice.map(row => `
                        <tr>
                            <td class="col-1">${row[0] || ''}</td>
                            <td class="col-2">${row[1] || ''}</td>
                            <td class="col-3">${row[2] || ''}</td>
                            <td class="col-4">${row[3] || ''}</td>
                            <td class="col-5">${row[4] || ''}</td>
                        </tr>
                    `).join('');

                    sectionDiv.innerHTML = `
                        <table>
                            <thead>
                                <tr>
                                    <th class="col-1">Specialit&#257;te</th>
                                    <th class="col-2">&#256;rsts</th>
                                    <th class="col-3">Kab.</th>
                                    <th class="col-4">Inform&#257;cija</th>
                                    <th class="col-5">T&#257;lrunis</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    `;
                    container.appendChild(sectionDiv);
                });
                
                // Fade in efekts
                setTimeout(() => {
                    fadeOverlay.classList.remove('active');
                }, 50);
            }, 300); // Gaidâm, kamçr fade-out beidzas
        }

        // Ielādēt datus sākotnēji
        loadData();
        
        // Atjauninât datus no CSV ik pēc 5 minūtēm
        setInterval(loadData, 300000);
    </script>
</body>
</html>
