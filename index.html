<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ārstu darba grafiks - 2 Sekcijas</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
    :root {
        --header-bg: #10693a; 
        --header-text: #ffffff;
        --row-even: #f1f8e9;
        --border-color: #bcbcbc;
        --accent-color: #d32f2f; 
    }

    * { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
        scrollbar-width: none; 
        -ms-overflow-style: none;
    }
    *::-webkit-scrollbar { display: none; }

    body {
        font-family: 'Roboto Condensed', sans-serif;
        background-color: #ffffff;
        width: 1440px; /* Tavs ekrāna platums */
        height: 1080px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    .wrapper {
        padding: 20px;
        height: 100%;
        width: 100%; /* Aizpilda visu body platumu */
        display: flex;
        flex-direction: column;
    }

    .container {
        display: grid;
        grid-template-columns: 1fr 1fr; /* Divas vienāda platuma kolonnas */
        gap: 40px; /* Atstarpe starp tabulām */
        width: 100%; /* Piespiež konteineru izstiepties */
        flex-grow: 1;
        align-items: start;
    }

    table {
        width: 100%; /* Katra tabula aizņem 100% no savas grid kolonnas */
        border-collapse: collapse;
        table-layout: fixed; /* Nodrošina stabilu kolonnu platumu */
    }

    th {
        background-color: var(--header-bg);
        color: var(--header-text) !important;
        text-align: left;
        padding: 15px 10px;
        font-size: 20px !important; 
        font-weight: 700 !important;
        text-transform: uppercase;
        border: 1px solid var(--border-color);
        height: 60px;
    }

    td {
        padding: 10px;
        border: 1px solid var(--border-color);
        font-size: 24px; /* Nedaudz lielāks teksts, lai labāk aizpildītu vietu */
        line-height: 1.2;
        vertical-align: middle;
        word-wrap: break-word;
        height: 75px; 
    }

    tr:nth-child(even) { background-color: var(--row-even); }

    /* Kolonnu proporcijas (procentos no tabulas platuma) */
    .col-1 { width: 35%; font-weight: 700; color: #10693a; }
    .col-2 { width: 35%; }
    .col-3 { width: 10%; text-align: center; color: var(--accent-color); font-weight: 700; font-size: 26px; }
    .col-4 { width: 20%; font-size: 18px; color: #444; }
</style>
</head>
<body>

    <div class="wrapper">
        <div id="error-msg">Atvainojiet, nevar ielādēt datus. Pārbaudiet savienojumu.</div>
        <div id="content" class="container"></div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0Jscw2AdeYt5syqR7_z_O5iBBdeopMpIDWXOUKbLo_KlnLWNUD6w_ljstR2GW9jHYlu5Kytp7QeDx/pub?output=csv';

        function init() {
            Papa.parse(csvUrl, {
                download: true,
                header: false,
                complete: function(results) {
                    const data = results.data.filter(row => row.length > 1 && row[0] !== "");
                    // Noņemam galvenes rindu, ja tāda ir
                    while (data.length > 0 && (data[0][0].toLowerCase().includes("spec") || data[0][0] === "")) {
                        data.shift();
                    }
                    renderTables(data);
                },
                error: function() {
                    document.getElementById('error-msg').style.display = 'block';
                }
            });
        }

        function renderTables(data) {
            const container = document.getElementById('content');
            container.innerHTML = '';

            const totalRows = data.length;
            const perTable = Math.ceil(totalRows / 2); // Sadalām uz 2 daļām

            for (let i = 0; i < 2; i++) {
                const slice = data.slice(i * perTable, (i + 1) * perTable);
                const table = document.createElement('table');
                
                let rowsHtml = slice.map(row => `
                    <tr>
                        <td class="col-1">${row[0] || ''}</td>
                        <td class="col-2">${row[1] || ''}</td>
                        <td class="col-3">${row[2] || ''}</td>
                        <td class="col-4">${row[3] || ''}</td>
                    </tr>
                `).join('');

                table.innerHTML = `
                    <thead>
                        <tr>
                            <th class="col-1">Specialitāte</th>
                            <th class="col-2">Ārsts</th>
                            <th class="col-3">Kab.</th>
                            <th class="col-4">Informācija</th>
                        </tr>
                    </thead>
                    <tbody>${rowsHtml}</tbody>
                `;
                container.appendChild(table);
            }
        }

        init();
        setInterval(init, 300000); // Atjauno ik pēc 5 minūtēm
    </script>
</body>
</html>
