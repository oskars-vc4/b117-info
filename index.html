<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ārstu grafiks - Optimizēts</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --header-bg: #10693a; 
            --header-text: #ffffff;
            --row-even: #f1f8e9;
            --border-color: #bcbcbc;
            --accent-color: #d32f2f; 
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        html, body {
            width: 1440px;
            height: 1080px;
            overflow: hidden !important;
            background-color: #ffffff;
            font-family: 'Roboto Condensed', sans-serif;
        }

        /* Paslēpjam scrollbars */
        *::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        .wrapper {
            width: 100%;
            height: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background-color: var(--header-bg);
            color: var(--header-text) !important; /* Piespiedu balts fonts */
            text-align: left;
            padding: 10px;
            font-size: 20px !important;
            font-weight: 700;
            text-transform: uppercase;
            border: 1px solid var(--border-color);
            height: 50px;
        }

        td {
            padding: 5px 10px;
            border: 1px solid var(--border-color);
            font-size: 22px; /* Vienāds izmērs Ārsts un Informācija kolonnām */
            line-height: 1.1;
            vertical-align: middle;
            word-wrap: break-word;
            height: 60px; /* Fiksēts augstums rindu izlīdzināšanai */
        }

        tr:nth-child(even) { background-color: var(--row-even); }

        /* Kolonnu proporcijas */
        .col-1 { width: 30%; font-weight: 700; color: #10693a; }
        .col-2 { width: 35%; color: #333; }
        .col-3 { width: 10%; text-align: center; color: var(--accent-color); font-weight: 700; font-size: 24px; }
        .col-4 { width: 25%; color: #333; }

        #error-msg {
            color: white;
            background: red;
            text-align: center;
            padding: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="error-msg">Kļūda: Nevar ielādēt datus.</div>

    <div class="wrapper">
        <div id="content" class="container"></div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0Jscw2AdeYt5syqR7_z_O5iBBdeopMpIDWXOUKbLo_KlnLWNUD6w_ljstR2GW9jHYlu5Kytp7QeDx/pub?output=csv';

        function loadData() {
            Papa.parse(csvUrl, {
                download: true,
                header: false,
                complete: function(results) {
                    let data = results.data.filter(row => row.length > 1 && row[0].trim() !== "");
                    // Noņemam galveni no Sheets
                    if (data.length > 0 && (data[0][0].toLowerCase().includes("spec") || data[0][0] === "")) {
                        data.shift();
                    }
                    render(data);
                },
                error: function() {
                    document.getElementById('error-msg').style.display = 'block';
                }
            });
        }

        function render(data) {
            const container = document.getElementById('content');
            container.innerHTML = '';

            const half = Math.ceil(data.length / 2);
            const leftData = data.slice(0, half);
            const rightData = data.slice(half);

            [leftData, rightData].forEach(slice => {
                const table = document.createElement('table');
                let rows = slice.map(row => `
                    <tr>
                        <td class="col-1">${row[0] || ''}</td>
                        <td class="col-2">${row[1] || ''}</td>
                        <td class="col-3">${row[2] || ''}</td>
                        <td class="col-4">${row[3] || ''}</td>
                    </tr>
                `).join('');

                table.innerHTML = `
                    <thead>
                        <tr>
                            <th class="col-1">Specialitāte</th>
                            <th class="col-2">Ārsts</th>
                            <th class="col-3">Kab.</th>
                            <th class="col-4">Informācija</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                `;
                container.appendChild(table);
            });
        }

        loadData();
        setInterval(loadData, 300000);
    </script>
</body>
</html>
