<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ārstu grafiks - Optimizēts Platums un Augstums</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --header-bg: #10693a; 
            --header-text: #ffffff;
            --row-even: #f1f8e9;
            --border-color: #bcbcbc;
            --accent-color: #d32f2f; 
            --phone-color: #10693a;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden !important;
            background-color: #ffffff;
            font-family: 'Roboto Condensed', sans-serif;
        }

        /* Scrollbar slēpšana */
        *::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        .wrapper {
            width: 100%;
            height: 100%;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
        }

        .container {
            display: flex;
            justify-content: space-between;
            gap: 25px;
            width: 100%;
            flex-grow: 1;
        }

        .section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background-color: var(--header-bg);
            color: var(--header-text) !important;
            text-align: left;
            padding: 5px 10px;
            font-size: 18px !important;
            font-weight: 700;
            text-transform: uppercase;
            border: 1px solid var(--border-color);
            height: 38px;
        }

        td {
            padding: 2px 8px;
            border: 1px solid var(--border-color);
            font-size: 17px; 
            line-height: 1.1;
            vertical-align: middle;
            word-wrap: break-word;
            /* Rindu augstums samazināts uz 44px, lai ietilptu vairāk ierakstu */
            height: 41px; 
            overflow: hidden;
        }

        tr:nth-child(even) { background-color: var(--row-even); }

        /* Koriģēti kolonnu platumi pēc tavas prasības */
        .col-1 { width: 28%; font-weight: 700; color: #10693a; } /* Specialitāte */
        .col-2 { width: 25%; color: #333; } /* Ārsts */
        .col-3 { width: 14%; text-align: center; color: var(--accent-color); font-weight: 700; font-size: 20px; } /* KAB - PALIKTS PLATĀKS */
        .col-4 { width: 18%; color: #444; font-size: 15px; } /* Informācija */
        .col-5 { width: 15%; text-align: center; color: var(--phone-color); font-weight: 700; font-size: 16px; } /* Tālrunis - SAŠAURINĀTS */

        #error-msg {
            color: white;
            background: red;
            text-align: center;
            padding: 5px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="error-msg">Kļūda: Nevar ielādēt datus.</div>

    <div class="wrapper">
        <div id="content" class="container"></div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0Jscw2AdeYt5syqR7_z_O5iBBdeopMpIDWXOUKbLo_KlnLWNUD6w_ljstR2GW9jHYlu5Kytp7QeDx/pub?output=csv';

        function loadData() {
            Papa.parse(csvUrl, {
                download: true,
                header: false,
                complete: function(results) {
                    let data = results.data.filter(row => row.length > 1 && row[0].trim() !== "");
                    if (data.length > 0 && (data[0][0].toLowerCase().includes("spec") || data[0][0] === "")) {
                        data.shift();
                    }
                    render(data);
                },
                error: function() {
                    document.getElementById('error-msg').style.display = 'block';
                }
            });
        }

        function render(data) {
            const container = document.getElementById('content');
            container.innerHTML = '';

            const half = Math.ceil(data.length / 2);
            const sectionsData = [data.slice(0, half), data.slice(half)];

            sectionsData.forEach(slice => {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'section';
                
                let rows = slice.map(row => `
                    <tr>
                        <td class="col-1">${row[0] || ''}</td>
                        <td class="col-2">${row[1] || ''}</td>
                        <td class="col-3">${row[2] || ''}</td>
                        <td class="col-4">${row[3] || ''}</td>
                        <td class="col-5">${row[4] || ''}</td>
                    </tr>
                `).join('');

                sectionDiv.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th class="col-1">Specialitāte</th>
                                <th class="col-2">Ārsts</th>
                                <th class="col-3">Kab.</th>
                                <th class="col-4">Informācija</th>
                                <th class="col-5">Tālrunis</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                `;
                container.appendChild(sectionDiv);
            });
        }

        loadData();
        setInterval(loadData, 300000);
    </script>
</body>
</html>
